# Repository settings for https://github.com/Data-Observatory/ohipy
# Managed by: https://github.com/apps/repository-settings
# Requires the "Repository Settings" GitHub App installed on the repo.

repository:
  name: ohipy
  description: Ocean Health Index calculation library
  homepage: https://github.com/Data-Observatory/ohipy
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks:
        strict: true
        contexts:
          - Lint
          - Type Check
          - Test
          - Build
      enforce_admins: true
      required_linear_history: false
      restrictions: null
