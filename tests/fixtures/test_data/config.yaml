# OHI Configuration for Testing
# Generated by setup_test_data.py

# Calculation Constants
constants:
  pressures_gamma: 0.5
  resilience_gamma: 0.5
  goal_discount: 1.0
  goal_beta: 0.67
  default_trend: 0
  adjust_trend: 10.0

# Scenario Configuration
scenario_year: 2024

# Paths (relative to project root)
paths:
  # Assessment directory
  assessment_dir: "tests/fixtures/test_data"

  # Configuration files (in conf/ subdirectory)
  conf_dir: "tests/fixtures/test_data/conf"
  goals_csv: "tests/fixtures/test_data/conf/goals.csv"
  pressures_matrix_csv: "tests/fixtures/test_data/conf/pressures_matrix.csv"
  resilience_matrix_csv: "tests/fixtures/test_data/conf/resilience_matrix.csv"
  pressure_categories_csv: "tests/fixtures/test_data/conf/pressure_categories.csv"
  resilience_categories_csv: "tests/fixtures/test_data/conf/resilience_categories.csv"
  scenario_data_years_csv: "tests/fixtures/test_data/conf/scenario_data_years.csv"

  # Data layers
  layers_dir: "tests/fixtures/test_data/layers"
  layers_csv: "tests/fixtures/test_data/layers.csv"

  # Output directory
  output_dir: "tests/fixtures/test_data/comparative"

# Layer Configuration
layer_format: "parquet"

layers:
  id_fields:
    - "rgn_id"
    - "cntry_key"
    - "fao_id"
    - "fao_saup_id"
    - "country_id"
    - "saup_id"
    - "fao_ohi_id"

  region_labels: "rgn_area"
  region_areas: "rgn_area"

# Element Weighting Mappings
element_mappings:
  resilience:
    NP: "np_harvest_tonnes_weigth"
    CP: "cp_habitat_extension"
    LIV: "le_sector_weight"
    ECO: "le_sector_weight"
    HAB: "element_wts_hab_pres_abs"
    LSP: "element_wts_lsp_km2_x_protection"

  pressures:
    NP: "np_harvest_tonnes_weigth"
    CP: "cp_habitat_extension"
    LIV: "le_sector_weight"
    ECO: "le_sector_weight"
    HAB: "element_wts_hab_pres_abs"
    LSP: "element_wts_lsp_km2_x_protection"

# Spatial Configuration
spatial:
  geojson: "tests/fixtures/test_data/eez2015/spatial/rgn_offshore_gcs_mapshaper-simplify_x2_eez-only.geojson"

# Dimension Descriptions
descriptions:
  index: "The overall Index represents the weighted average of all goal scores."

  dimensions:
    score: "This dimension is an average of the current status and likely future."
    status: "This dimension represents the current value of a goal or sub-goal relative to its reference point."
    future: "For this dimension, the likely future is calculated as the projected status in 5 years, informed by the current status, continued trend, inflected upwards by resilience and downwards by pressures."
    trend: "This dimension represents the recent change in the value of the status. Unlike all other dimensions which range in value from 0 to 100, the trend ranges from -1 to 1, representing the steepest declines to increases respectively."
    pressures: "This dimension represents the anthropogenic stressors that negatively affect the ability of a goal to be delivered to people. Pressures can affect either ecological or social (i.e. human) systems."
    resilience: "This dimension represents the social, institutional, and ecological factors that positively affect the ability of a goal to be delivered to people."
